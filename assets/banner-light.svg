<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="IMC Prosperity Trading Assistant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="word" x1="300" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="290" x2="160" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <g transform="translate(96 130)">
    <rect width="160" height="160" rx="36" fill="url(#tile)"/>
    <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round">
      <line x1="48" y1="100" x2="48" y2="124"/>
      <line x1="80" y1="60" x2="80" y2="110"/>
      <line x1="112" y1="34" x2="112" y2="98"/>
    </g>
    <g fill="#ffffff">
      <rect x="36" y="86" width="24" height="28" rx="6"/>
      <rect x="68" y="68" width="24" height="34" rx="6"/>
      <rect x="100" y="46" width="24" height="42" rx="6"/>
    </g>
  </g>
  <text x="300" y="182" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="68" font-weight="700" fill="url(#word)">IMC Prosperity</text>
  <text x="302" y="240" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="40" font-weight="600" fill="#0B1620">Trading Assistant</text>
  <text x="303" y="290" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="22" fill="#5B6B7A">RAG-powered insights over the Prosperity wiki, Discord &amp; market data.</text>
</svg>
