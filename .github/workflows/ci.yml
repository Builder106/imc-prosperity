name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Lint (critical errors only)
        # Syntax errors and undefined names in maintained source — not style
        # nitpicks, and not the scraped code snippets under data/.
        run: ruff check --select E9,F63,F7,F82 src app.py tests

      - name: Run tests
        run: pytest
