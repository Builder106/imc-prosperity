version: 2
updates:
  # Only GitHub Actions are auto-updated. Python dependencies are managed
  # deliberately — requirements.txt pins the deploy-critical packages
  # (langchain 0.2.x, recent opentelemetry, protobuf<7) and intentionally
  # leaves the heavy stack unpinned for the Cloud resolver. Automated bumps
  # there reintroduce the install/import failures that were just stabilized,
  # so the pip ecosystem is excluded.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
